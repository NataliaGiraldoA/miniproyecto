<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Problemas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
</head>
<body>
    {% extends "base.html" %}

    {% block title %}Lista de Problemas{% endblock %}
    
    {% block content %}
    <div class="container my-4">
        <h1 class="text-center mb-4">Lista de Problemas</h1>
        
        <div class="d-grid gap-3">
            {% for id, problem in problems.items() %}
            <a href="{{ url_for('problem_detail', problem_id=id) }}" 
               class="btn btn-purple btn-lg text-start">
                <div>
                    <strong>{{ problem.title }}</strong>
                    <span class="badge badge-purple float-end">{{ problem.difficulty }}</span>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
    {% endblock %}
</body>
</html>
