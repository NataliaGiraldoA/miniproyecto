<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>

    {% extends "base.html" %}

    {% block title %}Inicio{% endblock %}
    
    {% block content %}

    <div class="container">
        <h1>Resultado para {{ problem.title }}</h1>
        <div class="result {% if 'Correct' in result %}correct{% elif 'Incorrect' in result %}incorrect{% else %}error{% endif %}">
            {{ result }}
        </div>
        <a href="{{ url_for('problem_list') }}"><button>Volver a la lista de problemas</button></a>
    </div>

    {% endblock %}
</body>
</html>
